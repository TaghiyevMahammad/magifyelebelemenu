<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magify Menu - Ele Bele PlayStation Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0d0d0d;
            --bg-tertiary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-blue: #ffffff;
            --accent-orange: #cccccc;
            --accent-green: #e0e0e0;
            --accent-purple: #d9d9d9;
            --accent-gray: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.7);
            --glow-blue: 0 0 20px rgba(255, 255, 255, 0.1);
            --glow-orange: 0 0 20px rgba(200, 200, 200, 0.1);
            --glow-green: 0 0 20px rgba(224, 224, 224, 0.1);
            --glow-purple: 0 0 20px rgba(217, 217, 217, 0.1);
            --glow-gray: 0 0 20px rgba(160, 160, 160, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER SECTION */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* FILTER BUTTONS SECTION */
        .filter-section {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .filter-btn {
            padding: 10px 24px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(139, 92, 246, 0.2);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .filter-btn:hover {
            border-color: var(--accent-purple);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .filter-btn:hover::before {
            left: 0;
        }

        .filter-btn.active {
            background: #ffffff;
            border-color: transparent;
            color: #000000;
            box-shadow: var(--glow-blue);
        }

        /* MENU GRID */
        .menu-container {
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            animation: fadeIn 0.6s ease 0.4s both;
        }

        /* MENU CARD */
        .menu-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            opacity: 1;
            animation: fadeIn 0.6s ease backwards;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .menu-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: var(--shadow-lg);
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .menu-card.hidden {
            display: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }

        .card-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .category-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .badge-drinks {
            background: rgba(200, 200, 200, 0.2);
            color: #ffffff;
            border: 1px solid rgba(200, 200, 200, 0.3);
        }

        .menu-card:hover .badge-drinks {
            background: rgba(200, 200, 200, 0.3);
            box-shadow: var(--glow-blue);
        }

        .badge-snacks {
            background: rgba(170, 170, 170, 0.2);
            color: #ffffff;
            border: 1px solid rgba(170, 170, 170, 0.3);
        }

        .menu-card:hover .badge-snacks {
            background: rgba(170, 170, 170, 0.3);
            box-shadow: var(--glow-orange);
        }

        .badge-food {
            background: rgba(224, 224, 224, 0.2);
            color: #ffffff;
            border: 1px solid rgba(224, 224, 224, 0.3);
        }

        .menu-card:hover .badge-food {
            background: rgba(224, 224, 224, 0.3);
            box-shadow: var(--glow-green);
        }

        .badge-hookah {
            background: rgba(217, 217, 217, 0.2);
            color: #ffffff;
            border: 1px solid rgba(217, 217, 217, 0.3);
        }

        .menu-card:hover .badge-hookah {
            background: rgba(217, 217, 217, 0.3);
            box-shadow: var(--glow-purple);
        }

        .badge-service {
            background: rgba(140, 140, 140, 0.2);
            color: #ffffff;
            border: 1px solid rgba(140, 140, 140, 0.3);
        }

        .menu-card:hover .badge-service {
            background: rgba(140, 140, 140, 0.3);
            box-shadow: var(--glow-gray);
        }

        .card-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .card-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .card-price {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .menu-card:hover .card-price {
            font-size: 1.95rem;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.2));
        }

        .price-currency {
            font-size: 0.85rem;
            margin-left: 4px;
        }

        /* ANIMATIONS */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .menu-card {
            animation: fadeIn 0.6s ease backwards;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }

            .header h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .header {
                padding: 40px 20px 30px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 1rem;
            }

            .filter-section {
                padding: 30px 20px;
                gap: 10px;
            }

            .filter-btn {
                padding: 8px 18px;
                font-size: 0.85rem;
            }

            .card-title {
                font-size: 1.1rem;
            }

            .card-price {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .filter-section {
                padding: 20px 10px;
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }

            .menu-container {
                padding: 20px 10px;
            }

            .menu-card {
                padding: 16px;
            }

            .card-title {
                font-size: 1rem;
            }

            .card-price {
                font-size: 1.3rem;
            }
        }

        /* SCROLL SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* FOOTER */
        .footer {
            background: linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.05) 100%);
            border-top: 1px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            margin-top: 60px;
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .footer-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .footer-text a {
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-text a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .footer {
                padding: 30px 20px;
                margin-top: 40px;
            }

            .footer-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>Magify Menu</h1>
        <p>Ele Bele PlayStation Club Menu</p>
    </div>

    <!-- FILTER BUTTONS -->
    <div class="filter-section">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="drinks">Drinks</button>
        <button class="filter-btn" data-filter="snacks">Snacks</button>
        <button class="filter-btn" data-filter="food">Food</button>
        <button class="filter-btn" data-filter="hookah">Hookah</button>
        <button class="filter-btn" data-filter="service">Service</button>
    </div>

    <!-- MENU GRID -->
    <div class="menu-container">
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script>
        // Menu data
        const menuItems = [
            { id: 1, name: 'Elave pult', category: 'service', price: 0.50 },
            { id: 2, name: 'Cola /Fanta/Pepsi/Sprite (1L)', category: 'drinks', price: 2.50 },
            { id: 3, name: 'Cola (2L)', category: 'drinks', price: 4.00 },
            { id: 4, name: 'Cola (0.5L)', category: 'drinks', price: 1.50 },
            { id: 5, name: 'Natura', category: 'drinks', price: 3.50 },
            { id: 6, name: 'Cappy', category: 'drinks', price: 3.00 },
            { id: 7, name: 'Bizon (0.25L)', category: 'drinks', price: 1.20 },
            { id: 8, name: 'Bizon (0.5L)', category: 'drinks', price: 2.00 },
            { id: 9, name: 'Pivə', category: 'drinks', price: 1.50 },
            { id: 10, name: 'Çay + pletka', category: 'drinks', price: 6.00 },
            { id: 11, name: 'Çay + rulet', category: 'drinks', price: 5.00 },
            { id: 12, name: 'Kapuçino', category: 'drinks', price: 1.50 },
            { id: 13, name: 'Maccafe', category: 'drinks', price: 1.00 },
            { id: 14, name: 'Çips böyük', category: 'snacks', price: 4.50 },
            { id: 15, name: 'Çips orta', category: 'snacks', price: 2.50 },
            { id: 16, name: 'Suxarik', category: 'snacks', price: 1.50 },
            { id: 17, name: 'Tum', category: 'snacks', price: 2.00 },
            { id: 18, name: 'Qəlyan', category: 'hookah', price: 10.00 },
            { id: 19, name: 'Tost', category: 'food', price: 2.00 }
        ];

        const menuGrid = document.getElementById('menuGrid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Function to render menu cards
        function renderMenu(filter = 'all') {
            menuGrid.innerHTML = '';

            const filteredItems = filter === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.category === filter);

            filteredItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.style.animationDelay = `${index * 0.05}s`;

                const categoryLabel = item.category.charAt(0).toUpperCase() + item.category.slice(1);

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${item.name}</h3>
                        <span class="category-badge badge-${item.category}">${categoryLabel}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-price">
                            ${item.price.toFixed(2)}<span class="price-currency">₼</span>
                        </div>
                    </div>
                `;

                menuGrid.appendChild(card);
            });
        }

        // Filter functionality
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active button
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Filter and render menu
                const filterValue = btn.getAttribute('data-filter');
                renderMenu(filterValue);
            });
        });

        // Initial render
        renderMenu();
    </script>

    <!-- FOOTER -->
    <div class="footer">
        <p class="footer-text">All rights reserved. © Taghiyev Mahammad</p>
    </div>
</body>
</html>
